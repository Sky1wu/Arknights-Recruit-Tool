name: Deploy On Recruit Data Change

on:
  push:
    branches:
      - main
    paths:
      - "data/recruitment.json"
      - "requirements.txt"
      - ".github/workflows/deploy_on_recruit_data_change.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_APP_DIR }}"
            git fetch origin main
            git reset --hard origin/main
            . .venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart "${{ secrets.DEPLOY_SERVICE_NAME }}"
            sudo systemctl status "${{ secrets.DEPLOY_SERVICE_NAME }}" --no-pager
