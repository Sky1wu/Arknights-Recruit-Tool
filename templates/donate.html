{% extends "base.html" %}

{% block content %}
<section class="card donate-list-card">
<div class="section-head">
    <h1>捐赠名单</h1>
    <a href="{{ url_for('main.index') }}">返回首页</a>
</div>
{% if not records %}
<p class="empty-state">目前还没有人捐赠。</p>
{% else %}
<p class="lead">感谢这些朋友们的支持。</p>
<table class="donate-table">
    <thead>
        <tr>
            <th>时间</th>
            <th>金额</th>
            <th>名字</th>
        </tr>
    </thead>
    <tbody>
        {% for record in records %}
        <tr>
            <td>{{ record.date }}</td>
            <td>{{ record.amount }}</td>
            <td>{{ record.name }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}
</section>
{% endblock %}
